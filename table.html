<!DOCTYPE html>
<html lang="en">

<head>
    <title>Table Example</title>

</head>

<body>
    <h1>Table Example</h1>
    <hr>
    <h2>Student Details</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Sr.No.</th>
                <th>Name</th>
                <th>Address</th>
                <th>Email</th>
                <th>Phone Number</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>abc</td>
                <td>Pune</td>
                <td>abc@example.com</td>
                <td>1234567890</td>
            </tr>
            <tr>
                <td>2</td>
                <td>qwe</td>
                <td>Thane</td>
                <td>qwe@example.com</td>
                <td>9987654321</td>
            </tr>
            <tr>
                <td>3</td>
                <td>asd</td>
                <td>Mumbai</td>
                <td>asd@example.com</td>
                <td>9876543210</td>
            </tr>

        </tbody>
        
</body>

</html>
