<!DOCTYPE html>
<html lang="en">

<head>
    <title>Image Example</title>
</head>

<body>
    <h1>Image Example</h1>
    <img src="images/sunrise.jpg" alt="sunrise image" />
    <img src="images/woods.jpg" alt="woods image" />

    <picture>
        <img src="images/woods.jpg" alt="woods image" />
    </picture>

    <figure>
        <img src="images/woods.jpg" alt="woods image" />
        <figcaption>woods Image</figcaption>
    </figure>
</body>

</html>
