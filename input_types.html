<!DOCTYPE html>
<html lang="en">

<head>
    <title>Input Types</title>
</head>


<body>
    <h1> Input Types Examples</h1>
    <form>
        <label>Enter Name: </label>
        <input type="text" placeholder="Enter your name" /><br><br>
        <label>Enter Email: </label>
        <input type="email" placeholder="Enter your email" /><br><br>
        <label>Enter Phone Number: </label>
        <input type="number" placeholder="Enter your phone number" /><br><br>
        <label>Enter Password: </label>
        <input type="password" placeholder="Enter your password" /><br><br>
        <label>Enter Date: </label>
        <input type="date" />
        <label>Enter Month: </label>
        <input type="month" />
        <label>Enter Week: </label>
        <input type="week" /><br><br>
        <label>Enter Date and Time: </label>
        <input type="datetime-local" /><br><br>
        <label>Enter Range: </label>
        <input type="range" /><br><br>
        <label>Choose Cities: </label>
        <input type="checkbox" checked>Mumbai
        <input type="checkbox">Pune
        <input type="checkbox">Nashik
        <input type="checkbox">Nagpur <br><br>
        <label>Select gender: </label>
        <input type="radio" name="gender" />Male
        <input type="radio" name="gender" />Female
        <input type="radio" name="gender" />Other<br><br>
        <label> Upload Document</label>
        <input type="file" multiple /><br><br>
        <label>Enter color: </label>
        <input type="color" /><br><br>
        <label>Enter your favorite dish: </label>
        <select>
            <option value="choose..."></option>
            <option value="biryani">Biryani</option>
            <option value="pavbhaji">Pav Bhaji</option>
            <option value="vada pav">Vada Pav</option>
            <option value="misal pav">Misal Pav</option>
        </select><br><br>

        <label>Enter Address: </label>
        <textarea rows="5" cols="40" placeholder="Enter your address"></textarea><br><br>
        <input type="submit" value="Submit" />
        <input type="button" value="Click Me" />
        <input type="reset" value="Reset" />


    </form>

</body>

</html>
